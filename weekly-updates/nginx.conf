server {
    listen 80;
    server_name rosie.vipmedicalgroup.ai;

    # Redirect HTTP to HTTPS (uncomment after SSL is set up)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_connect_timeout 120;
    }

    # Static files served directly by nginx for performance
    location /static/ {
        alias /root/weekly-updates/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Large file uploads (update text can be long)
    client_max_body_size 10M;
}

